<!DOCTYPE html>
<html>
    <head>
        <title>Focsd</title>
        <link id="favicon" rel="icon" type="image/png">
        <style>
            * {
                font-family: "Atkinson Hyperlegible Mono", sans-serif;
                font-optical-sizing: auto;
                font-weight: 400;
                font-style: normal;
                color: #339989;
            }
            body {
                margin: 0;
                padding: 0;
                background-color: #283044;
                width: 100vw;
                height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
            }
            #timerContainer {
                position: relative;
                width: min(60vh, 60vw);
                height: min(60vh, 60vw);
                display: flex;
                justify-content: space-evenly;
                align-items: center;
                flex-direction: column;
            }
            #timerContainer > svg {
                position: absolute;
                top: 0;
                left: 0;
            }
            #timerContent {
                position: relative;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                gap: 10px;
                z-index: 1;
            }
            #timer {
                text-align: center;
                font-size: 5rem;
                margin: 0;
                outline: none;
                border: none;
                background: transparent;
                width: 6ch;
                caret-color: #339989;
            }
            #timer[contenteditable="true"] {
                border-bottom: 2px solid #339989;
                cursor: text;
            }
            #mode {
                text-align: center;
                font-size: 1.5rem;
                margin: 0;
            }
            #startStopWrapper {
                filter: drop-shadow(0 0 0px #339989);
                transition: filter 0.3s ease;
                cursor: pointer;
            }
            #startStopWrapper:hover {
                filter: drop-shadow(0 0 8px #339989);
            }
            #startStop {
                width: min(5vh, 5vw);
                height: min(5vh, 5vw);
                clip-path: polygon(0 0, 100% 50%, 100% 50%, 0 100%);
                background-color: #339989;
                transition: clip-path 0.3s ease;
            }
            #startStop.paused {
                clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
            }
            #settingsButton {
                position: relative;
                z-index: 1;
                width: min(4vh, 4vw);
                height: min(4vh, 4vw);
                cursor: pointer;
                opacity: 0.6;
                transition: opacity 0.3s ease, filter 0.3s ease;
            }
            #settingsButton:hover {
                opacity: 1;
                filter: drop-shadow(0 0 8px #339989);
            }
            #settingsButton.active {
                opacity: 1;
                filter: drop-shadow(0 0 8px #339989);
            }
        </style>
    </head>
    <body>
        <div id="timerContainer">
            <svg width="100%" height="100%" viewBox="0 0 300 300">
                <circle cx="150" cy="150" r="120" fill="none" stroke="#339989" stroke-width="5"/>
                <circle id="dot" cx="150" cy="30" r="10" fill="#283044" stroke="#339989" stroke-width="5"/>
            </svg>
            <div id="timerContent">
                <h1 id="timer" contenteditable="false" spellcheck="false">25:00</h1>
                <div id="startStopWrapper" onclick="startStop();">
                    <div id="startStop"></div>
                </div>
                <p id="mode">Work</p>
                <p id="sessionCount">0 Sessions</p>
            </div>
            <svg id="settingsButton" onclick="openSettings();" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
                <path fill="#339989" d="M 447.70881 -12.781343 A 42.041451 42.041451 0 0 0 405.66786 29.260344 L 405.66786 50.301721 L 27.434765 50.301721 A 42.041302 42.041302 0 0 0 -14.606185 92.341354 A 42.041302 42.041302 0 0 0 27.434765 134.38304 L 405.66786 134.38304 L 405.66786 155.44906 A 42.041451 42.041451 0 0 0 447.70881 197.49075 A 42.041451 42.041451 0 0 0 489.74976 155.44906 L 489.74976 134.38304 L 573.78036 134.38304 A 42.041302 42.041302 0 0 0 615.82336 92.341354 A 42.041302 42.041302 0 0 0 573.78036 50.301721 L 489.74976 50.301721 L 489.74976 29.260344 A 42.041451 42.041451 0 0 0 447.70881 -12.781343 z M 143.0012 197.48869 A 42.041451 42.041451 0 0 0 100.9582 239.53038 L 100.9582 260.5697 L 27.447078 260.5697 A 42.041302 42.041302 0 0 0 -14.593872 302.61139 A 42.041302 42.041302 0 0 0 27.447078 344.65308 L 100.9582 344.65308 L 100.9582 365.7191 A 42.041451 42.041451 0 0 0 143.0012 407.76078 A 42.041451 42.041451 0 0 0 185.04215 365.7191 L 185.04215 344.65308 L 573.79472 344.65308 A 42.041302 42.041302 0 0 0 615.83567 302.61139 A 42.041302 42.041302 0 0 0 573.79472 260.5697 L 185.04215 260.5697 L 185.04215 239.53038 A 42.041451 42.041451 0 0 0 143.0012 197.48869 z M 279.59427 407.76078 A 42.041451 42.041451 0 0 0 237.55332 449.80042 L 237.55332 470.83974 L 27.447078 470.83974 A 42.041302 42.041302 0 0 0 -14.593872 512.88143 A 42.041302 42.041302 0 0 0 27.447078 554.92106 L 237.55332 554.92106 L 237.55332 575.98913 A 42.041451 42.041451 0 0 0 279.59427 618.02877 A 42.041451 42.041451 0 0 0 321.63522 575.98913 L 321.63522 554.92106 L 573.79472 554.92106 A 42.041302 42.041302 0 0 0 615.83567 512.88143 A 42.041302 42.041302 0 0 0 573.79472 470.83974 L 321.63522 470.83974 L 321.63522 449.80042 A 42.041451 42.041451 0 0 0 279.59427 407.76078 z"/>
            </svg>
        </div>
        <script>
            let WORK_SECS = parseInt(localStorage.getItem("workSecs")) || 25 * 60;
            let BREAK_SECS = parseInt(localStorage.getItem("breakSecs")) || 5 * 60;

            let totalSeconds = WORK_SECS;
            let secondsLeft = totalSeconds;
            let isRunning = false;
            let isWork = true;
            let sessions = 0;
            let startTime = null;
            let settingsOpen = false;
            let editingWork = true;
            let titleInterval = null;
            let lastValidInput = secsToDisplay(WORK_SECS);

            function secsToDisplay(secs) {
                const mins = Math.floor(secs / 60);
                const s = secs % 60;
                return String(mins).padStart(2, "0") + ":" + String(s).padStart(2, "0");
            }

            function updateDisplay(secondsRemaining) {
                const ceiled = Math.ceil(secondsRemaining);
                const mins = Math.floor(ceiled / 60);
                const secs = ceiled % 60;
                document.querySelector("#timer").innerText =
                    String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");

                const progress = secondsRemaining / totalSeconds;
                const angle = (2 * Math.PI * (1 - progress)) - Math.PI / 2;
                const dotX = 150 + 120 * Math.cos(angle);
                const dotY = 150 + 120 * Math.sin(angle);
                document.querySelector("#dot").setAttribute("cx", dotX);
                document.querySelector("#dot").setAttribute("cy", dotY);
            }

            function updateTitle() {
                const elapsed = (performance.now() - startTime) / 1000;
                const remaining = Math.max(totalSeconds - elapsed, 0);
                const ceiled = Math.ceil(remaining);
                const mins = Math.floor(ceiled / 60);
                const secs = ceiled % 60;
                const mode = isWork ? "Work" : "Break";
                document.title = String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0") + " - " + mode + " - Focsd";
            }

            function switchMode(fromInterval) {
                isWork = !isWork;
                if (isWork) {
                    totalSeconds = WORK_SECS;
                    document.querySelector("#mode").innerText = "Work";
                } else {
                    sessions++;
                    if (sessions === 1) {
                        document.querySelector("#sessionCount").innerText = sessions + " Session";
                    } else {
                        document.querySelector("#sessionCount").innerText = sessions + " Sessions";
                    }
                    totalSeconds = BREAK_SECS;
                    document.querySelector("#mode").innerText = "Break";
                }
                secondsLeft = totalSeconds;
                updateDisplay(secondsLeft);
                updateFavicon();
                if (!fromInterval) {
                    playBeep();
                    if (Notification.permission === "granted") {
                        new Notification("Focsd", { body: isWork ? "Time to work!" : "Time for a break!" });
                    }
                }
                startTimer();
            }

            function startTimer() {
                clearInterval(titleInterval);
                isRunning = true;
                startTime = performance.now();

                titleInterval = setInterval(function() {
                    if (!isRunning) {
                        clearInterval(titleInterval);
                        return;
                    }
                    const elapsed = (performance.now() - startTime) / 1000;
                    const remaining = Math.max(totalSeconds - elapsed, 0);

                    if (remaining <= 0) {
                        clearInterval(titleInterval);
                        isRunning = false;
                        playBeep();
                        if (Notification.permission === "granted") {
                            new Notification("Focsd", { body: isWork ? "Time for a break!" : "Time to work!" });
                        }
                        switchMode(true);
                        return;
                    }

                    updateTitle();
                }, 500);

                function frame(timestamp) {
                    if (!isRunning) return;
                    const elapsed = (timestamp - startTime) / 1000;
                    secondsLeft = Math.max(totalSeconds - elapsed, 0);
                    updateDisplay(secondsLeft);
                    if (secondsLeft <= 0) {
                        isRunning = false;
                        return;
                    }
                    requestAnimationFrame(frame);
                }
                requestAnimationFrame(frame);
            }

            function startStop() {
                if (settingsOpen) return;
                Notification.requestPermission();
                document.querySelector("#startStop").classList.toggle("paused");
                if (isRunning) {
                    isRunning = false;
                    clearInterval(titleInterval);
                    secondsLeft = totalSeconds;
                    updateDisplay(secondsLeft);
                    updateTitle();
                } else {
                    startTimer();
                }
            }

            function saveTimerInput() {
                const timer = document.querySelector("#timer");
                const text = timer.innerText.trim();
                const valid = /^\d{1,2}:\d{2}$/.test(text);

                if (!valid) {
                    timer.innerText = lastValidInput;
                    return;
                }

                const parts = text.split(":");
                let mins = parseInt(parts[0]);
                let secs = parseInt(parts[1]);

                if (isNaN(mins)) mins = 0;
                if (isNaN(secs)) secs = 0;

                mins = Math.min(59, Math.max(0, mins));
                secs = Math.min(59, Math.max(0, secs));

                const newTotal = mins * 60 + secs;

                if (newTotal <= 0) {
                    timer.innerText = lastValidInput;
                    return;
                }

                if (editingWork) {
                    WORK_SECS = newTotal;
                    if (isWork) {
                        totalSeconds = newTotal;
                        secondsLeft = newTotal;
                    }
                } else {
                    BREAK_SECS = newTotal;
                    if (!isWork) {
                        totalSeconds = newTotal;
                        secondsLeft = newTotal;
                    }
                }

                lastValidInput = String(mins).padStart(2, "0") + ":" + String(secs).padStart(2, "0");
            }

            function toggleEditMode() {
                if (!settingsOpen) return;
                saveTimerInput();
                editingWork = !editingWork;
                document.querySelector("#mode").innerText = editingWork ? "Work" : "Break";
                lastValidInput = secsToDisplay(editingWork ? WORK_SECS : BREAK_SECS);
                document.querySelector("#timer").innerText = lastValidInput;
                document.querySelector("#timer").focus();
            }

            function openSettings() {
                settingsOpen = !settingsOpen;
                const timer = document.querySelector("#timer");
                const btn = document.querySelector("#settingsButton");

                if (settingsOpen) {
                    if (isRunning) {
                        isRunning = false;
                        clearInterval(titleInterval);
                        document.querySelector("#startStop").classList.remove("paused");
                    }
                    editingWork = true;
                    lastValidInput = secsToDisplay(WORK_SECS);
                    document.querySelector("#mode").innerText = "Work";
                    timer.innerText = lastValidInput;
                    timer.contentEditable = "true";
                    timer.focus();
                    btn.classList.add("active");
                    document.querySelector("#mode").style.cursor = "pointer";

                    timer.addEventListener("keydown", function limitInput(e) {
                        if (!settingsOpen) {
                            timer.removeEventListener("keydown", limitInput);
                            return;
                        }
                        const allowed = ["Backspace", "Delete", "ArrowLeft", "ArrowRight"];
                        if (!allowed.includes(e.key) && timer.innerText.length >= 5) {
                            e.preventDefault();
                        }
                    });
                } else {
                    saveTimerInput();
                    timer.contentEditable = "false";
                    btn.classList.remove("active");
                    editingWork = true;
                    document.querySelector("#mode").innerText = isWork ? "Work" : "Break";
                    secondsLeft = isWork ? WORK_SECS : BREAK_SECS;
                    totalSeconds = secondsLeft;
                    updateDisplay(secondsLeft);
                    document.querySelector("#mode").style.cursor = "default";
                    localStorage.setItem("workSecs", WORK_SECS);
                    localStorage.setItem("breakSecs", BREAK_SECS);
                }
            }

            document.querySelector("#mode").onclick = toggleEditMode;

            updateDisplay(secondsLeft);
            updateFavicon();
            document.title = secsToDisplay(WORK_SECS) + " - Work - Focsd";

            document.addEventListener("keydown", function(e) {
                if (e.key === " ") {
                    e.preventDefault();
                    startStop();
                }
            });

            function playBeep() {
                const ctx = new AudioContext();
                const oscillator = ctx.createOscillator();
                const gain = ctx.createGain();

                oscillator.connect(gain);
                gain.connect(ctx.destination);

                oscillator.type = "sine";
                oscillator.frequency.value = 880;

                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 1);

                oscillator.start(ctx.currentTime);
                oscillator.stop(ctx.currentTime + 1);
            }

            function updateFavicon() {
                const canvas = document.createElement("canvas");
                canvas.width = 32;
                canvas.height = 32;
                const ctx = canvas.getContext("2d");

                ctx.beginPath();
                ctx.arc(16, 16, 14, 0, 2 * Math.PI);
                ctx.fillStyle = isWork ? "#339989" : "#283044";
                ctx.fill();

                ctx.beginPath();
                ctx.arc(16, 16, 14, 0, 2 * Math.PI);
                ctx.strokeStyle = "#339989";
                ctx.lineWidth = 2;
                ctx.stroke();

                document.querySelector("#favicon").href = canvas.toDataURL();
            }
        </script>
    </body>
</html>
